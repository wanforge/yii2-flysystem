name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.0", "8.1", "8.2", "8.3", "8.4"]

    steps:
    - uses: actions/checkout@v5

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        tools: composer:v2
        coverage: xdebug

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Install dependencies (PHP 8.0)
      if: matrix.php-version == '8.0'
      run: composer install --prefer-dist --no-progress --no-interaction --ignore-platform-req=php

    - name: Install dependencies (PHP >= 8.1)
      if: matrix.php-version != '8.0'
      run: composer install --prefer-dist --no-progress --no-interaction

    - name: Run test suite
      run: vendor/bin/phpunit -c phpunit.xml.dist --log-junit build/test-results/junit.xml

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: build/test-results/junit.xml

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: "8.4"
        tools: composer:v2
        coverage: xdebug

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress --no-interaction

    - name: Run coverage
      run: composer test-coverage

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: wanforge/yii2-flysystem
        files: coverage.xml
